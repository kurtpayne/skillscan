# Example: calling the SkillScan reusable workflow from your repository.
#
# Copy this file to .github/workflows/skillscan.yml in any repository
# that contains AI skill artifacts you want to scan.
#
# See docs/GITHUB_ACTIONS.md for full documentation.

name: SkillScan

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── Minimal usage ──────────────────────────────────────────────────
  # Scans the ./skills directory with the default strict policy,
  # uploads SARIF to the GitHub Security tab, and fails the build
  # if any finding reaches the "block" verdict.
  skillscan:
    uses: kurtpayne/skillscan-security/.github/workflows/skillscan-scan.yml@main
    with:
      scan-path: ./skills

  # ── Advanced usage (uncomment to use) ──────────────────────────────
  # skillscan-advanced:
  #   uses: kurtpayne/skillscan-security/.github/workflows/skillscan-scan.yml@main
  #   with:
  #     scan-path: ./agent-tools
  #     policy-profile: moderate
  #     fail-on: warn
  #     rulepack-channel: preview
  #     sarif-category: skillscan-agent-tools
  #     extra-args: "--clamav"

  # ── Custom policy file ─────────────────────────────────────────────
  # skillscan-custom-policy:
  #   uses: kurtpayne/skillscan-security/.github/workflows/skillscan-scan.yml@main
  #   with:
  #     scan-path: ./skills
  #     policy-file: .github/skillscan-policy.yaml
  #     fail-on: block

  # ── SARIF disabled (text output only) ──────────────────────────────
  # skillscan-no-sarif:
  #   uses: kurtpayne/skillscan-security/.github/workflows/skillscan-scan.yml@main
  #   with:
  #     scan-path: ./skills
  #     upload-sarif: false
