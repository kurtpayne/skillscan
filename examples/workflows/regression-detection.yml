# Regression Detection — GitHub Actions workflow template
#
# Compares the current scan against a stored baseline and opens a
# GitHub issue if unexpected verdict changes are detected.
#
# Usage:
#   1. Copy this file to .github/workflows/regression-detection.yml
#   2. Commit an initial baseline: skillscan scan ./skills --format json --out .github/baseline.json
#   3. Optionally create .github/regressions.yaml for known/accepted regressions

name: Regression Detection

on:
  schedule:
    - cron: "0 3 * * *"    # Daily at 3am UTC
  workflow_dispatch: {}

jobs:
  detect-regressions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install skillscan
        run: pip install skillscan-security

      - name: Scan current state
        run: skillscan scan ./skills --format json --out current.json || true

      - name: Fetch baseline
        run: |
          if [ -f .github/baseline.json ]; then
            cp .github/baseline.json baseline.json
          else
            echo '{"findings":[],"verdict":"allow","metadata":{"scanned_at":"unknown"},"score":0,"iocs":[],"dependency_findings":[],"capabilities":[]}' > baseline.json
          fi

      - name: Detect regressions
        id: alert
        run: |
          ARGS="--baseline-report baseline.json --current-report current.json --format json --out alert.json"
          if [ -f .github/regressions.yaml ]; then
            ARGS="$ARGS --known-regressions .github/regressions.yaml"
          fi
          skillscan alert $ARGS || true
          echo "count=$(python3 -c "import json; print(json.load(open('alert.json'))['unexpected_count'])")" >> $GITHUB_OUTPUT

      - name: Open issue if regressions found
        if: steps.alert.outputs.count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const alerts = JSON.parse(require('fs').readFileSync('alert.json', 'utf8'));
            const items = alerts.unexpected.map(a =>
              `- **${a.severity.toUpperCase()}** \`${a.rule_id}\`: ${a.type} finding in \`${a.path}${a.line ? ':' + a.line : ''}\``
            ).join('\n');
            const body = [
              '## Regression Alert',
              '',
              `**${alerts.unexpected_count}** unexpected change(s) detected.`,
              '',
              `| Metric | Value |`,
              `|--------|-------|`,
              `| New findings | ${alerts.new_count} |`,
              `| Resolved findings | ${alerts.resolved_count} |`,
              `| Verdict changed | ${alerts.verdict_changed ? alerts.baseline_verdict + ' → ' + alerts.current_verdict : 'No'} |`,
              `| Known regressions filtered | ${alerts.known_regression_count} |`,
              '',
              '### Unexpected regressions',
              '',
              items,
              '',
              '_Generated by `skillscan alert` — see examples/workflows/regression-detection.yml_',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Regression: ${alerts.unexpected_count} unexpected verdict change(s)`,
              body,
              labels: ['regression-alert'],
            });

      - name: Update baseline on success
        if: steps.alert.outputs.count == '0'
        run: |
          cp current.json .github/baseline.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/baseline.json
          git diff --cached --quiet || (git commit -m "chore: update regression baseline" && git push)
