name: observe
description: >
  Day-one adoption profile. Scan always exits 0 regardless of findings.
  All findings are reported but do not block. Use this to evaluate SkillScan
  against your skill corpus before enabling enforcement. Prints an adoption
  banner on every scan as a reminder to switch to an enforcement profile.
  Switch to --profile strict or --profile ci when ready to enforce.
thresholds:
  warn: 1
  block: 9999
weights:
  malware_pattern: 3
  instruction_abuse: 2
  prompt_injection_semantic: 2
  exfiltration: 3
  dependency_vulnerability: 2
  threat_intel: 3
  binary_artifact: 1
hard_block_rules: []
block_min_confidence: 0.0
allow_domains: []
block_domains: []
limits:
  max_files: 4000
  max_depth: 8
  max_bytes: 200000000
  timeout_seconds: 60
  max_binary_artifacts: 500
  max_binary_bytes: 100000000
