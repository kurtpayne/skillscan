name: ci
description: >
  PR gate profile. Low noise — blocks only on CRITICAL and HIGH severity findings.
  ML is optional; if model is not installed, static rules still run.
  Recommended for lightweight CI pipelines without ML.
thresholds:
  warn: 30
  block: 70
weights:
  malware_pattern: 3
  instruction_abuse: 2
  prompt_injection_semantic: 2
  exfiltration: 3
  dependency_vulnerability: 1
  threat_intel: 3
  binary_artifact: 1
hard_block_rules:
  - MAL-001   # download-and-execute (critical)
  - IOC-001   # known-malicious domain (critical)
  - DEF-001   # defender exclusion manipulation (critical)
  - MAL-025   # MCP tool poisoning via hidden instruction block (critical)
  - MAL-029   # Solana RPC C2 channel (critical)
  - CHN-011   # MCP tool poisoning + credential exfil chain (critical)
  - CHN-013   # container escape + host path mount chain (critical)
block_min_confidence: 0.80
allow_domains: []
block_domains: []
limits:
  max_files: 4000
  max_depth: 8
  max_bytes: 200000000
  timeout_seconds: 60
  max_binary_artifacts: 500
  max_binary_bytes: 100000000
