name: paranoid
description: >
  Maximum-sensitivity profile for high-risk environments (e.g., marketplace
  ingestion pipelines, third-party skill audits). Blocks on score >= 40.
  Treats capability inflation, obfuscation, and policy violations as hard
  blocks. Expect elevated false-positive rates — review all findings manually.
  Pair with --ml-detect and --require-model for full coverage.
thresholds:
  warn: 10
  block: 40
weights:
  malware_pattern: 5
  instruction_abuse: 4
  prompt_injection_semantic: 4
  exfiltration: 5
  dependency_vulnerability: 3
  threat_intel: 5
  binary_artifact: 3
hard_block_rules:
  - MAL-001   # download-and-execute (critical)
  - IOC-001   # known-malicious domain (critical)
  - DEF-001   # defender exclusion manipulation (critical)
  - MAL-025   # MCP tool poisoning via hidden instruction block (critical)
  - MAL-029   # Solana RPC C2 channel (critical)
  - CHN-011   # MCP tool poisoning + credential exfil chain (critical)
  - CHN-013   # container escape + host path mount chain (critical)
  - OBF-001   # bidirectional unicode control character (high)
  - OBF-003   # unicode PUA obfuscation near dynamic execution sink (high)
  - OBF-004   # unicode steganography in prompt context (high)
  - MAL-051   # embedded binary / shellcode blob (critical)
  - PSV-005   # capability inflation — wildcard permission scope (high)
  - MAL-052   # token/cost harvesting — intentional resource burn (high)
block_min_confidence: 0.60
allow_domains: []
block_domains: []
limits:
  max_files: 10000
  max_depth: 12
  max_bytes: 500000000
  timeout_seconds: 300
  max_binary_artifacts: 0
  max_binary_bytes: 0
