name: enterprise
description: >
  Formal security gate for enterprise environments. Blocks on score >= 70,
  all categories. ML model is expected to be installed and used with --ml-detect.
  Use with --require-model to hard-fail if the model is not present.
thresholds:
  warn: 20
  block: 60
weights:
  malware_pattern: 4
  instruction_abuse: 3
  prompt_injection_semantic: 3
  exfiltration: 4
  dependency_vulnerability: 3
  threat_intel: 4
  binary_artifact: 2
hard_block_rules:
  - MAL-001   # download-and-execute (critical)
  - IOC-001   # known-malicious domain (critical)
  - DEF-001   # defender exclusion manipulation (critical)
  - MAL-025   # MCP tool poisoning via hidden instruction block (critical)
  - MAL-029   # Solana RPC C2 channel (critical)
  - CHN-011   # MCP tool poisoning + credential exfil chain (critical)
  - CHN-013   # container escape + host path mount chain (critical)
block_min_confidence: 0.70
allow_domains: []
block_domains: []
limits:
  max_files: 4000
  max_depth: 8
  max_bytes: 200000000
  timeout_seconds: 120
  max_binary_artifacts: 500
  max_binary_bytes: 100000000
