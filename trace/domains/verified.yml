# ─────────────────────────────────────────────────────────────────────────────
# ALWAYS BLOCK
# These are never allowlisted regardless of user config or profiles.
# They are known exfil / C2 infrastructure or services with no legitimate
# use in a skill context.
# ─────────────────────────────────────────────────────────────────────────────
always_block:
  - "ngrok.io"            # tunneling — no legitimate skill use
  - "*.ngrok.io"
  - "ngrok-free.app"
  - "*.ngrok-free.app"
  - "serveo.net"          # tunneling
  - "*.serveo.net"
  - "localhost.run"       # tunneling
  - "glot.io"             # known in IOC DB
  - "webhook.site"        # exfil staging
  - "requestbin.com"      # exfil staging
  - "*.requestbin.com"
  - "pipedream.net"       # exfil staging (legitimate use exists but too risky as default)
  - "*.pipedream.net"
  - "canarytokens.org"    # canary token infrastructure (not a threat, but unusual in skills)
  - "burpcollaborator.net"
  - "*.burpcollaborator.net"
  - "oastify.com"
  - "*.oastify.com"
  - "interactsh.com"
  - "*.interactsh.com"
