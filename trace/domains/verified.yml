# skillscan-trace: Verified Domain Allowlist
# ============================================
# Bundled with the container. Updated via `skillscan-trace update-domains`.
# Last updated: 2026-03-20
# Version: 1.0.0
#
# HOW THIS WORKS
# --------------
# Domains in this file are the shipped defaults. They are loaded first.
# User config (trace-config.yml) is merged on top — additions only, no removals.
# Per-scan CLI flags (--allow-domains, --block-domains) are applied last.
#
# Precedence (highest wins):
#   CLI flags > trace-config.yml > this file
#
# All network calls are LOGGED regardless of allowlist status.
# Allowlisted domains suppress findings; they do not suppress logging.
# Block-listed domains always generate a finding, even if also allowlisted.
#
# MAINTENANCE
# -----------
# This file is versioned in the skillscan-security repo and bundled into
# the Docker image at build time. To update without rebuilding:
#   skillscan-trace update-domains          # pulls latest from repo
#   skillscan-trace update-domains --check  # shows what would change, no apply
#
# MONITORING (automated)
# ----------------------
# .github/workflows/domain-allowlist-monitor.yml runs weekly and polls:
#   - Google Cloud cloud.json (syncToken)
#   - AWS ip-ranges.json (createDate)
#   - GitHub Meta API (response hash)
#   - Cloudflare IPs (response hash)
# When any source changes, a GitHub issue is opened with a review checklist.
# Updates are NOT automatic — a human reviews the diff and updates this file.
# The workflow uses signal-based detection, not a fixed staleness timer.

_meta:
  version: "1.0.0"
  updated: "2026-03-20"
  description: >
    Verified domain allowlist for skillscan-trace. Covers major cloud providers,
    developer tools, package registries, and AI/ML services. Skills that call
    these domains are not flagged for network findings, but all calls are logged.
  update_url: "https://raw.githubusercontent.com/kurtpayne/skillscan-security/main/trace/domains/verified.yml"

# ─────────────────────────────────────────────────────────────────────────────
# TIER 1: Always-on defaults
# Enabled for every scan with no configuration required.
# These are universally legitimate targets for agent skills.
# ─────────────────────────────────────────────────────────────────────────────
defaults:

  # Package registries — skills that install dependencies
  package_registries:
    - "*.npmjs.org"           # npm
    - "registry.npmjs.org"
    - "*.npmjs.com"
    - "pypi.org"              # Python packages
    - "*.pypi.org"
    - "files.pythonhosted.org"
    - "crates.io"             # Rust
    - "static.crates.io"
    - "rubygems.org"          # Ruby
    - "*.rubygems.org"
    - "pkg.go.dev"            # Go
    - "proxy.golang.org"
    - "sum.golang.org"
    - "packagist.org"         # PHP
    - "repo.maven.apache.org" # Java/Maven
    - "central.sonatype.com"
    - "nuget.org"             # .NET
    - "*.nuget.org"

  # Source control
  source_control:
    - "github.com"
    - "*.github.com"
    - "api.github.com"
    - "raw.githubusercontent.com"
    - "objects.githubusercontent.com"
    - "gitlab.com"
    - "*.gitlab.com"
    - "bitbucket.org"
    - "*.bitbucket.org"

  # CDN / static assets
  cdn:
    - "*.cloudflare.com"
    - "cdnjs.cloudflare.com"
    - "*.fastly.net"
    - "*.jsdelivr.net"
    - "unpkg.com"

  # DNS / time — low-level infrastructure
  infrastructure:
    - "1.1.1.1"               # Cloudflare DNS
    - "8.8.8.8"               # Google DNS
    - "8.8.4.4"
    - "time.cloudflare.com"   # NTP
    - "pool.ntp.org"
    - "*.pool.ntp.org"

# ─────────────────────────────────────────────────────────────────────────────
# TIER 2: Named profiles
# Activated by --profile <name> or profiles: [name] in trace-config.yml.
# Use these for skills that legitimately call into specific cloud providers
# or developer platforms. Not enabled by default to avoid masking exfil
# to these services in skills that have no legitimate reason to use them.
# ─────────────────────────────────────────────────────────────────────────────
profiles:

  google_cloud:
    description: "Google Cloud Platform APIs and CLI (gcloud, gsutil, bq)"
    domains:
      - "*.googleapis.com"
      - "*.google.com"
      - "accounts.google.com"
      - "oauth2.googleapis.com"
      - "storage.googleapis.com"
      - "*.storage.googleapis.com"
      - "*.cloudfunctions.net"
      - "*.run.app"
      - "*.appspot.com"
      - "metadata.google.internal"  # GCE metadata server

  aws:
    description: "Amazon Web Services APIs and CLI"
    domains:
      - "*.amazonaws.com"
      - "*.aws.amazon.com"
      - "aws.amazon.com"
      - "*.cloudfront.net"
      - "s3.amazonaws.com"
      - "*.s3.amazonaws.com"
      - "*.s3-website*.amazonaws.com"
      - "ec2.*.amazonaws.com"
      - "lambda.*.amazonaws.com"

  azure:
    description: "Microsoft Azure APIs and CLI"
