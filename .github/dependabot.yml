version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      ml-stack:
        patterns:
          - "transformers"
          - "torch"
          - "peft"
          - "onnx*"
          - "optimum*"
          - "accelerate"
          - "datasets"
      dev-tools:
        patterns:
          - "ruff"
          - "mypy"
          - "pytest*"
          - "coverage"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
