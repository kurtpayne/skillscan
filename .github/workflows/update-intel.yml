name: Update Intel DBs

# Refreshes the bundled IOC and vulnerability databases from upstream feeds.
# Runs twice daily so the shipped DB stays within ~12 hours of the live feeds.
# Any changes are committed directly to main with [skip ci] to avoid triggering
# the full CI suite on a pure data update.
#
# Secrets required: none (all feeds are public).
# Permissions required: contents: write (to push the commit).

on:
  schedule:
    # 06:00 UTC — morning refresh
    - cron: "0 6 * * *"
    # 18:00 UTC — evening refresh
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — print stats but do not write or commit"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update-intel:
    name: Refresh IOC + vuln DBs
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use the built-in GITHUB_TOKEN — no extra secret needed for a same-repo push.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install only the packages the seed scripts need (no full editable install)
          pip install requests pyyaml

      # -----------------------------------------------------------------------
      # IOC DB refresh
      # -----------------------------------------------------------------------
      - name: Refresh ioc_db.json
        id: ioc
        run: |
          DRY_FLAG=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          python3 scripts/seed_ioc_db.py $DRY_FLAG 2>&1 | tee /tmp/ioc_output.txt
          # Capture entry count for step summary
          TOTAL=$(grep -oP 'Total entries: \K[0-9]+' /tmp/ioc_output.txt || echo "unknown")
          echo "total_entries=${TOTAL}" >> "$GITHUB_OUTPUT"
          cat /tmp/ioc_output.txt

      # -----------------------------------------------------------------------
      # Vuln DB refresh
      # -----------------------------------------------------------------------
      - name: Refresh vuln_db.json
        id: vuln
        run: |
          DRY_FLAG=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          python3 scripts/seed_vuln_db.py $DRY_FLAG 2>&1 | tee /tmp/vuln_output.txt
          VULNS=$(grep -oP 'Total vulnerable versions: \K[0-9]+' /tmp/vuln_output.txt || echo "unknown")
          echo "total_vulns=${VULNS}" >> "$GITHUB_OUTPUT"
          cat /tmp/vuln_output.txt

      # -----------------------------------------------------------------------
      # Validate JSON integrity before committing
      # -----------------------------------------------------------------------
      - name: Validate JSON
        if: inputs.dry_run != true
        run: |
          python3 -c "
          import json, sys
          for path in [
              'src/skillscan/data/intel/ioc_db.json',
              'src/skillscan/data/intel/vuln_db.json',
          ]:
              try:
                  json.load(open(path))
                  print(f'OK: {path}')
              except json.JSONDecodeError as e:
                  print(f'INVALID JSON: {path}: {e}', file=sys.stderr)
                  sys.exit(1)
          # Extra: verify vuln_db uses nested dict format (not OSV list format).
          # Skip the '_meta' top-level key — its values are lists of package names,
          # not ecosystem dicts, and are intentionally not vuln entries.
          db = json.load(open('src/skillscan/data/intel/vuln_db.json'))
          bad = []
          for ecosystem, pkgs in db.items():
              if ecosystem == '_meta':
                  continue  # _meta holds lists of checked package names, not vuln data
              if not isinstance(pkgs, dict):
                  continue
              for pkg, versions in pkgs.items():
                  if isinstance(versions, list):
                      bad.append(f'{ecosystem}/{pkg}')
          if bad:
              print(f'ERROR: list-format entries found (silently ignored by scanner): {bad}', file=sys.stderr)
              sys.exit(1)
          print('vuln_db format: OK')
          "

      # -----------------------------------------------------------------------
      # Commit and push if anything changed
      # -----------------------------------------------------------------------
      - name: Commit updated DBs
        if: inputs.dry_run != true
        run: |
          git config user.name  "skillscan-bot"
          git config user.email "bot@skillscan.sh"
          git add src/skillscan/data/intel/ioc_db.json \
                  src/skillscan/data/intel/vuln_db.json
          if git diff --cached --quiet; then
            echo "No changes to intel DBs — feeds unchanged since last run."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            MSG="chore: refresh intel DBs ${TIMESTAMP} [skip ci] | IOC=${{ steps.ioc.outputs.total_entries }} vuln=${{ steps.vuln.outputs.total_vulns }}"
            git commit -m "${MSG}"
            git push origin HEAD:main
            echo "Intel DBs updated and pushed."
          fi

      # -----------------------------------------------------------------------
      # Step summary
      # -----------------------------------------------------------------------
      - name: Write job summary
        if: always()
        run: |
          echo "### Intel DB Refresh Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| DB | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| ioc_db.json | ${{ steps.ioc.outputs.total_entries }} total entries |" >> "$GITHUB_STEP_SUMMARY"
          echo "| vuln_db.json | ${{ steps.vuln.outputs.total_vulns }} vulnerable versions |" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "> **Dry run** — no files written or committed." >> "$GITHUB_STEP_SUMMARY"
          fi
