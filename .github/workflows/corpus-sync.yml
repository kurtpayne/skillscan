name: Corpus Sync & Model Update Trigger
on:
  repository_dispatch:
    types: [corpus-updated]
  schedule:
    - cron: "0 6,18 * * *"
  workflow_dispatch:
    inputs:
      force_retrain:
        description: "Force fine-tune even if below delta threshold"
        required: false
        default: "false"
        type: string
jobs:
  corpus-sync:
    name: Sync corpus manifest & evaluate delta
    runs-on: ubuntu-latest
    outputs:
      should_retrain: ${{ steps.sync.outputs.should_retrain }}
      summary: ${{ steps.sync.outputs.summary }}
      corpus_path: ${{ steps.clone.outputs.corpus_path }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # No pip install needed: corpus_manager.py uses only stdlib (hashlib, json, pathlib, argparse)
      - name: Clone skillscan-corpus (all corpus data now lives there)
        id: clone
        run: |
          if [ -z "$CORPUS_DEPLOY_KEY" ]; then
            echo "CORPUS_DEPLOY_KEY not set — cannot fetch corpus"
            echo "corpus_path=" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          mkdir -p ~/.ssh
          echo "$CORPUS_DEPLOY_KEY" > ~/.ssh/corpus_deploy_key
          chmod 600 ~/.ssh/corpus_deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          GIT_SSH_COMMAND='ssh -i ~/.ssh/corpus_deploy_key -o StrictHostKeyChecking=yes' \
            git clone --depth 1 git@github.com:kurtpayne/skillscan-corpus.git /tmp/skillscan-corpus
          rm -f ~/.ssh/corpus_deploy_key
          echo "corpus_path=/tmp/skillscan-corpus" >> "$GITHUB_OUTPUT"
          echo "Corpus cloned to /tmp/skillscan-corpus"
          # Show inventory summary
          echo "=== Corpus inventory ==="
          for d in training_corpus adversarial jailbreak_distillations social_engineering held_out_eval; do
            count=$(find "/tmp/skillscan-corpus/$d" -name "*.md" -o -name "*.yaml" -o -name "*.yml" 2>/dev/null | wc -l)
            echo "  $d: $count files"
          done
        env:
          CORPUS_DEPLOY_KEY: ${{ secrets.CORPUS_DEPLOY_KEY }}
      - name: Run corpus sync
        id: sync
        # corpus_manager.py lives in skillscan-corpus and owns all corpus layout
        # knowledge. No dependency on skillscan-security for this step.
        run: |
          python "$CORPUS_PATH/scripts/corpus_manager.py" sync \
            --root "$CORPUS_PATH" \
            --github-output "$GITHUB_OUTPUT"
        env:
          CORPUS_PATH: ${{ steps.clone.outputs.corpus_path }}
          SKILLSCAN_MIN_NEW_EXAMPLES: ${{ vars.SKILLSCAN_MIN_NEW_EXAMPLES || '50' }}
          SKILLSCAN_MIN_DELTA_PCT: ${{ vars.SKILLSCAN_MIN_DELTA_PCT || '0.10' }}
      - name: Commit updated manifest back to skillscan-corpus
        if: steps.clone.outputs.corpus_path != ''
        run: |
          cd /tmp/skillscan-corpus
          git config user.name "skillscan-bot"
          git config user.email "bot@skillscan.sh"
          # Set up SSH for push
          mkdir -p ~/.ssh
          echo "$CORPUS_DEPLOY_KEY" > ~/.ssh/corpus_deploy_key
          chmod 600 ~/.ssh/corpus_deploy_key
          GIT_SSH_COMMAND='ssh -i ~/.ssh/corpus_deploy_key -o StrictHostKeyChecking=yes' \
            git push origin main || echo "No manifest changes to push"
          rm -f ~/.ssh/corpus_deploy_key
        env:
          CORPUS_DEPLOY_KEY: ${{ secrets.CORPUS_DEPLOY_KEY }}
  fine-tune:
    name: Fine-tune DeBERTa on Modal GPU (conditional)
    needs: corpus-sync
    if: needs.corpus-sync.outputs.should_retrain == 'true' || github.event.inputs.force_retrain == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Modal + minimal dependencies
        run: pip install modal -e ".[dev]" --quiet
      - name: Configure Modal credentials
        run: |
          python - <<'EOF'
          import json, os, pathlib
          creds_dir = pathlib.Path.home() / ".modal"
          creds_dir.mkdir(parents=True, exist_ok=True)
          creds = {
              "token_id": os.environ["MODAL_TOKEN_ID"],
              "token_secret": os.environ["MODAL_TOKEN_SECRET"],
          }
          (creds_dir / "credentials.json").write_text(json.dumps(creds))
          print("Modal credentials configured")
          EOF
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
      - name: Clone skillscan-corpus for fine-tune scripts
        run: |
          mkdir -p ~/.ssh
          echo "$CORPUS_DEPLOY_KEY" > ~/.ssh/corpus_deploy_key
          chmod 600 ~/.ssh/corpus_deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          GIT_SSH_COMMAND='ssh -i ~/.ssh/corpus_deploy_key -o StrictHostKeyChecking=yes' \
            git clone --depth 1 git@github.com:kurtpayne/skillscan-corpus.git /tmp/skillscan-corpus
          rm -f ~/.ssh/corpus_deploy_key
        env:
          CORPUS_DEPLOY_KEY: ${{ secrets.CORPUS_DEPLOY_KEY }}
      - name: Dispatch fine-tune to Modal GPU
        id: finetune
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force_retrain }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          modal run /tmp/skillscan-corpus/scripts/finetune_modal.py $FORCE_FLAG
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
          SKILLSCAN_CORPUS_DIR: /tmp/skillscan-corpus/training_corpus
      - name: Post summary
        if: always()
        run: |
          echo "### Fine-tune Result" >> $GITHUB_STEP_SUMMARY
          echo "Corpus delta: ${{ needs.corpus-sync.outputs.summary }}" >> $GITHUB_STEP_SUMMARY
          echo "Model pushed to: https://huggingface.co/kurtpayne/skillscan-deberta-adapter" >> $GITHUB_STEP_SUMMARY
