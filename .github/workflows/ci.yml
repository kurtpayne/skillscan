name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        python-version: ['3.12', '3.13']
    env:
      # P5: Prevent user-local ~/.skillscan/rules/ from influencing test results.
      # Tests must pass against the bundled rulepack only (post-mortem action item).
      SKILLSCAN_NO_USER_RULES: "1"
    steps:
      - uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Format check
        if: matrix.python-version == '3.12'
        run: |
          ruff format --check src tests
      - name: Lint
        if: matrix.python-version == '3.12'
        run: |
          ruff check src tests
      - name: Type Check
        if: matrix.python-version == '3.12'
        run: |
          mypy src
      - name: Tests with coverage
        if: matrix.python-version == '3.12'
        run: |
          pytest -q --cov=skillscan --cov-report=xml --cov-report=term
      - name: Tests
        if: matrix.python-version != '3.12'
        run: |
          pytest -q
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: false
