name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        python-version: ['3.12', '3.13']
    env:
      # P5: Prevent user-local ~/.skillscan/rules/ from influencing test results.
      # Tests must pass against the bundled rulepack only (post-mortem action item).
      SKILLSCAN_NO_USER_RULES: "1"
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Format check
        if: matrix.python-version == '3.12'
        run: |
          ruff format --check src tests
      - name: Lint
        if: matrix.python-version == '3.12'
        run: |
          ruff check src tests
      - name: Type Check
        if: matrix.python-version == '3.12'
        run: |
          mypy src
      - name: Tests with coverage
        if: matrix.python-version == '3.12'
        run: |
          pytest -q --cov=skillscan --cov-report=xml --cov-report=term
      - name: Tests
        if: matrix.python-version != '3.12'
        run: |
          pytest -q
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: false

  website-drift:
    name: Detect website rule drift
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          path: skillscan-security
      - name: Check out website (skip gracefully if token unavailable)
        id: checkout-website
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: kurtpayne/skillscan-website
          path: skillscan-website
      - name: Setup Python
        if: steps.checkout-website.outcome == 'success'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install PyYAML
        if: steps.checkout-website.outcome == 'success'
        run: pip install pyyaml
      - name: Check website rule sync
        if: steps.checkout-website.outcome == 'success'
        run: |
          python3 skillscan-security/scripts/sync-website-rules.py \
            --website-dir skillscan-website \
            --dry-run
          EXIT=$?
          if [ $EXIT -eq 2 ]; then
            echo ""
            echo "::error::Website TSX files are out of sync with default.yaml."
            echo "::error::Run: python3 scripts/sync-website-rules.py"
            echo "::error::Then commit the updated TSX files."
            exit 1
          elif [ $EXIT -eq 1 ]; then
            echo "::error::sync-website-rules.py encountered an error."
            exit 1
          fi
          echo "Website rule files are in sync."

  cross-tool-recall:
    name: Cross-tool recall vs Cisco skill-scanner fixtures
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install SkillScan
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Clone Cisco skill-scanner test fixtures
        run: |
          git clone --depth=1 https://github.com/cisco-ai-defense/skill-scanner /tmp/cisco-skill-scanner
      - name: Verify malicious fixtures are caught
        run: |
          FAIL=0
          for skill_dir in exfiltrator prompt-injection; do
            FIXTURE="/tmp/cisco-skill-scanner/evals/test_skills/malicious/${skill_dir}"
            echo "=== Scanning ${skill_dir} ==="
            OUTPUT=$(skillscan scan "$FIXTURE" --policy-profile strict 2>&1) || true
            echo "$OUTPUT"
            if echo "$OUTPUT" | grep -q "Verdict: BLOCK"; then
              echo "PASS: ${skill_dir} correctly blocked"
            else
              echo "::error::FAIL: ${skill_dir} was not blocked by SkillScan (expected BLOCK)"
              FAIL=1
            fi
          done
          # EICAR fixture: expect at least a finding (ALLOW with score > 0)
          FIXTURE="/tmp/cisco-skill-scanner/evals/test_skills/malicious/eicar-test"
          echo "=== Scanning eicar-test ==="
          OUTPUT=$(skillscan scan "$FIXTURE" --policy-profile strict 2>&1) || true
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -qE "Score: [1-9]"; then
            echo "PASS: eicar-test produced findings"
          else
            echo "::error::FAIL: eicar-test produced no findings"
            FAIL=1
          fi
          # Safe fixture: must not be blocked
          FIXTURE="/tmp/cisco-skill-scanner/evals/test_skills/safe/simple-formatter"
          echo "=== Scanning simple-formatter (safe) ==="
          OUTPUT=$(skillscan scan "$FIXTURE" --policy-profile strict 2>&1) || true
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "Verdict: ALLOW"; then
            echo "PASS: simple-formatter correctly allowed"
          else
            echo "::error::FAIL: simple-formatter was blocked (false positive)"
            FAIL=1
          fi
          exit $FAIL
