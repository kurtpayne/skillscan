name: Sync Bundled Rules

# MANUAL FALLBACK ONLY — the daily 12:00 UTC pattern-update agent now syncs
# the bundled rules+intel snapshot as part of its normal flow, eliminating
# this workflow's previous role as a scheduled cron.
#
# Why: PRs created by GITHUB_TOKEN do not trigger workflow runs (a security
# feature against CI loops), so this workflow's auto-merge loop was
# structurally broken — the resulting PR's required-status-check CI never
# fired and the PR sat open forever. The daily agent runs as a real user,
# so its PRs trigger CI normally.
#
# Kept as `workflow_dispatch` only so an operator can manually re-sync if
# the daily agent missed a run. If you find yourself reaching for this
# regularly, the daily agent is broken — investigate that, don't paper
# over it here.

on:
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Fetch latest rules from skillscan-rules
        run: |
          for f in default.yaml ast_flows.yaml multilang.yaml; do
            curl -sL "https://raw.githubusercontent.com/kurtpayne/skillscan-rules/main/rules/$f" \
              -o "src/skillscan/data/rules/$f"
          done
          for f in ioc_db.json vuln_db.json managed_sources.json; do
            curl -sL "https://raw.githubusercontent.com/kurtpayne/skillscan-rules/main/intel/$f" \
              -o "src/skillscan/data/intel/$f"
          done

      - name: Create PR if changed
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          title: "chore: sync bundled rules + intel from skillscan-rules"
          branch: sync-bundled-rules
          commit-message: "chore: sync bundled rules + intel snapshot"
          body: "Automated sync of detection rules and intel from [skillscan-rules](https://github.com/kurtpayne/skillscan-rules). Auto-merges once required status checks pass."

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-operation == 'created' || steps.cpr.outputs.pull-request-operation == 'updated'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --squash "${{ steps.cpr.outputs.pull-request-number }}"

      # Open a GitHub issue when the scheduled run fails. Manual workflow_dispatch
      # is skipped (operator already sees the failure interactively). Each failed
      # run gets its own issue (titled by run ID) for natural per-run dedup.
      - name: Alert on failure
        if: failure() && github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          LOG_TAIL=$(gh run view "$RUN_ID" --log-failed 2>/dev/null | tail -80 | sed 's/^/    /' || echo "    (could not fetch failed log — see run page)")

          BODY=$(cat <<EOF
          \`sync-bundled-rules.yml\` failed at $(date -u +"%Y-%m-%d %H:%M UTC").

          - **Run:** $RUN_URL
          - **Trigger:** scheduled cron
          - **Repo:** \`kurtpayne/skillscan-security\`

          ## Failure log tail

          \`\`\`
          $LOG_TAIL
          \`\`\`

          This issue was opened automatically by the workflow's failure handler. Close after the next successful run or after a fix lands.
          EOF
          )

          gh issue create \
            -R "${{ github.repository }}" \
            --title "🚨 [auto] sync-bundled-rules.yml run #$RUN_ID failed" \
            --body "$BODY" \
            --label "automation,cron-failure" 2>&1 || \
          gh issue create \
            -R "${{ github.repository }}" \
            --title "🚨 [auto] sync-bundled-rules.yml run #$RUN_ID failed" \
            --body "$BODY"
