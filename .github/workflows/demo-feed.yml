name: Demo Feed Update

on:
  schedule:
    # Run every Sunday at 04:00 UTC (after the Saturday intel update at 18:00 UTC)
    - cron: "0 4 * * 0"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — print results without pushing to website"
        type: boolean
        default: false

permissions:
  contents: read
  issues: write

jobs:
  scan-demo-feed:
    name: Scan demo feed entries and publish results
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout skillscan-security
        uses: actions/checkout@v4
        with:
          path: skillscan-security

      - name: Checkout skillscan-corpus (for skill-index.yaml)
        uses: actions/checkout@v4
        with:
          repository: kurtpayne/skillscan-corpus
          token: ${{ secrets.SCHEMA_SYNC_PAT }}
          path: skillscan-corpus

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install skillscan
        run: |
          pip install --quiet ./skillscan-security

      - name: Run demo feed scan
        id: scan
        continue-on-error: true
        run: |
          python3 skillscan-security/.github/scripts/build_demo_feed.py \
            --index skillscan-corpus/index/skill-index.yaml \
            --output demo-feed.json \
            ${{ inputs.dry_run == 'true' && '--dry-run' || '' }}
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Show summary
        run: |
          if [ -f demo-feed.json ]; then
            python3 -c "
          import json, sys
          data = json.load(open('demo-feed.json'))
          entries = data.get('entries', [])
          blocks = sum(1 for e in entries if e.get('verdict') == 'BLOCK')
          allows = sum(1 for e in entries if e.get('verdict') == 'ALLOW')
          errors = sum(1 for e in entries if e.get('verdict') == 'ERROR')
          print(f'Demo feed: {len(entries)} entries — BLOCK={blocks}, ALLOW={allows}, ERROR={errors}')
          unexpected = [e for e in entries if e.get('verdict') != e.get('expected_verdict')]
          if unexpected:
              print(f'WARNING: {len(unexpected)} unexpected verdicts:')
              for e in unexpected:
                  print(f'  {e[\"id\"]}: expected {e[\"expected_verdict\"]}, got {e[\"verdict\"]}')
          else:
              print('All verdicts match expected.')
          " | tee -a \$GITHUB_STEP_SUMMARY
          fi

      - name: Open or update regression issue for unexpected verdicts
        if: ${{ always() && inputs.dry_run != 'true' && hashFiles('demo-feed.json') != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('demo-feed.json')) { console.log('No feed file — skipping.'); return; }
            const data = JSON.parse(fs.readFileSync('demo-feed.json', 'utf8'));
            const unexpected = (data.entries || []).filter(e => e.verdict !== e.expected_verdict);
            if (unexpected.length === 0) { console.log('All verdicts matched — no issue needed.'); return; }

            const scanDate = new Date().toISOString().split('T')[0];
            const rows = unexpected.map(e => {
              const ref = e.reference ? ` ([ref](${e.reference}))` : '';
              return `| \`${e.id}\` | ${e.label} | ${e.archetype || '—'} | ${e.expected_verdict} | **${e.verdict}** |${ref} |`;
            }).join('\n');
            const body = [
              `## Demo Feed Regression — ${scanDate}`,
              '',
              `**${unexpected.length} unexpected verdict(s)** detected in the weekly demo feed scan.`,
              '',
              '| Entry ID | Label | Archetype | Expected | Got | Ref |',
              '|---|---|---|---|---|---|',
              rows,
              '',
              `**SkillScan version:** ${data.skillscan_version || 'unknown'}`,
              `**Total scanned:** ${data.entry_count} (BLOCK=${data.block_count}, ALLOW=${data.allow_count}, ERROR=${data.error_count})`,
              '',
              '### Next steps',
              '- FP (benign → BLOCK): investigate rule triggering, add suppression or update rule confidence',
              '- FN (malicious → ALLOW): add corpus examples, tighten rule, or add new rule',
              '',
              '_This issue was opened automatically by the Demo Feed Update workflow._',
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'demo-feed-regression',
              state: 'open',
            });

            if (issues.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: `## New scan results (${scanDate})\n\n${body}`,
              });
              console.log(`Updated existing issue #${issues[0].number}`);
            } else {
              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[demo-feed] Unexpected verdicts detected — review required (${scanDate})`,
                body,
                labels: ['demo-feed-regression', 'quality'],
              });
              console.log(`Opened issue #${issue.data.number}`);
            }

      - name: Push demo-feed.json to skillscan-website
        if: ${{ always() && inputs.dry_run != 'true' && hashFiles('demo-feed.json') != '' }}
        run: |
          git clone --depth=1 \
            https://x-access-token:${{ secrets.SCHEMA_SYNC_PAT }}@github.com/kurtpayne/skillscan-website.git \
            skillscan-website

          cp demo-feed.json skillscan-website/client/public/demo-feed.json

          cd skillscan-website
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add client/public/demo-feed.json
          if git diff --quiet --cached -- client/public/demo-feed.json; then
            echo "demo-feed.json unchanged — skipping commit"
          else
            SCAN_DATE=$(date -u +%Y-%m-%d)
            git commit -m "chore: update demo feed [${SCAN_DATE}] [skip ci]"
            git push origin main
            echo "demo-feed.json updated and pushed"
          fi
